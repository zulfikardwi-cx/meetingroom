const FACILITY_ICONS = { "TV": "📺", "Whiteboard": "📋", "Camera Conference": "🎥" };

function todayStr(offsetDays = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return d.toISOString().slice(0, 10);
}

function getWeekDays(baseDate) {
  const d = new Date(baseDate);
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({ length: 7 }, (_, i) => {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    return dd;
  });
}

const HOURS = Array.from({ length: 13 }, (_, i) => `${String(i + 8).padStart(2, "0")}:00`);

function timeToMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

function formatMonthYear(d) {
  return d.toLocaleDateString("id-ID", { month: "long", year: "numeric" });
}

function addHour(t) {
  const [h, m] = t.split(":").map(Number);
  return `${String(Math.min(h + 1, 20)).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
}

// ── CONFLICT DETECTION ────────────────────────────────────────────────────────
function hasConflict(bookings, candidate) {
  const cStart = timeToMinutes(candidate.startTime);
  const cEnd   = timeToMinutes(candidate.endTime);
  return bookings.some(b => {
    if (b.id === candidate.id) return false;         // same booking (edit)
    if (b.roomId !== candidate.roomId) return false; // different room
    if (b.date   !== candidate.date)   return false; // different day
    const bStart = timeToMinutes(b.startTime);
    const bEnd   = timeToMinutes(b.endTime);
    return cStart < bEnd && cEnd > bStart;           // overlap
  });
}

// ── TOAST SYSTEM ──────────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return (
    <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`pointer-events-auto flex items-start gap-3 bg-white border rounded-xl shadow-lg px-4 py-3 min-w-[280px] max-w-sm ${t.leaving ? "toast-out" : "toast-in"}`}
          style={{ borderColor: t.color || "#e2e8f0" }}>
          <span className="text-xl flex-shrink-0">{t.icon}</span>
          <div className="flex-1">
            <div className="font-semibold text-sm text-slate-800">{t.title}</div>
            <div className="text-xs text-slate-500 mt-0.5">{t.message}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback(({ icon = "ℹ️", title, message, color }) => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, icon, title, message, color, leaving: false }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, leaving: true } : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 350);
    }, 3500);
  }, []);
  return { toasts, addToast };
}

// ── SIDE-BY-SIDE LAYOUT ALGORITHM (Google Calendar style) ─────────────────────
// Groups overlapping bookings and assigns column positions so they render side-by-side.
function computeColumns(dayBookings) {
  // Sort by start time
  const sorted = [...dayBookings].sort((a, b) =>
    timeToMinutes(a.startTime) - timeToMinutes(b.startTime)
  );

  // Assign each booking a { col, totalCols } via sweep-line
  const columns = []; // columns[i] = end-time of last booking in that column

  const result = sorted.map(b => {
    const bStart = timeToMinutes(b.startTime);
    const bEnd   = timeToMinutes(b.endTime);

    // Find first column where this booking fits (no overlap)
    let col = columns.findIndex(endTime => endTime <= bStart);
    if (col === -1) { col = columns.length; columns.push(bEnd); }
    else            { columns[col] = bEnd; }

    return { ...b, col };
  });

  // Second pass: compute totalCols for each booking = max overlapping columns
  return result.map(b => {
    const bStart = timeToMinutes(b.startTime);
    const bEnd   = timeToMinutes(b.endTime);
    // Count how many bookings overlap with this one
    const overlapping = result.filter(other => {
      const oS = timeToMinutes(other.startTime), oE = timeToMinutes(other.endTime);
      return bStart < oE && bEnd > oS;
    });
    const totalCols = Math.max(...overlapping.map(o => o.col)) + 1;
    return { ...b, totalCols };
  });
}

// ── BOOKING CHIP ──────────────────────────────────────────────────────────────
function BookingChip({ booking, room, currentUser, onClick, col, totalCols }) {
  const SLOT_H  = 56;
  const start   = timeToMinutes(booking.startTime) - timeToMinutes("08:00");
  const duration = timeToMinutes(booking.endTime) - timeToMinutes(booking.startTime);
  const top     = (start / 60) * SLOT_H;
  const height  = Math.max((duration / 60) * SLOT_H - 4, 24);
  const isOwn   = booking.bookedById === currentUser?.id;

  // Side-by-side positioning
  const GAP      = 2; // px between chips
  const widthPct = (1 / totalCols) * 100;
  const leftPct  = (col / totalCols) * 100;

  return (
    <div
      className="absolute rounded-lg px-2 py-1 booking-chip cursor-pointer shadow-sm hover:shadow-md hover:z-10 transition-shadow overflow-hidden"
      style={{
        top:             top + "px",
        height:          height + "px",
        left:            `calc(${leftPct}% + ${col === 0 ? 4 : GAP}px)`,
        width:           `calc(${widthPct}% - ${col === 0 ? GAP + 4 : GAP * 2}px)`,
        backgroundColor: room.colorHex + "22",
        borderLeft:      `3px solid ${room.colorHex}`,
        color:           room.colorHex,
      }}
      onClick={() => onClick(booking)}
    >
      <div className="font-semibold truncate">{booking.title}</div>
      {height > 36 && <div className="text-xs opacity-75 truncate">{booking.startTime}–{booking.endTime}</div>}
      {height > 52 && isOwn && <div className="text-xs opacity-60 truncate">📌 Saya</div>}
    </div>
  );
}

// ── CALENDAR GRID ─────────────────────────────────────────────────────────────
function CalendarGrid({ weekDays, bookings, rooms, selectedRooms, currentUser, onSlotClick, onChipClick }) {
  return (
    <div className="flex-1 overflow-auto">
      {/* Day headers */}
      <div className="sticky top-0 z-10 bg-white border-b border-slate-200 flex">
        <div className="w-16 flex-shrink-0" />
        {weekDays.map((day, i) => {
          const isToday = day.toISOString().slice(0, 10) === todayStr(0);
          return (
            <div key={i} className={`flex-1 text-center py-3 text-sm font-medium border-l border-slate-100 ${isToday ? "text-blue-600 bg-blue-50" : "text-slate-600"}`}>
              <span className="text-xs font-normal text-slate-400 block">{day.toLocaleDateString("id-ID", { weekday: "short" })}</span>
              <span className={`text-lg font-bold leading-tight ${isToday ? "bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center mx-auto" : ""}`}>{day.getDate()}</span>
            </div>
          );
        })}
      </div>

      {/* Time grid */}
      <div className="flex">
        <div className="w-16 flex-shrink-0">
          {HOURS.map(h => (
            <div key={h} className="h-14 flex items-start justify-end pr-2 pt-1">
              <span className="text-xs text-slate-400 font-medium">{h}</span>
            </div>
          ))}
        </div>
        {weekDays.map((day, di) => {
          const dateStr     = day.toISOString().slice(0, 10);
          const isToday     = dateStr === todayStr(0);
          const dayBookings = bookings.filter(b => b.date === dateStr && selectedRooms.includes(b.roomId));
          // Compute side-by-side columns for this day
          const laid        = computeColumns(dayBookings);

          return (
            <div key={di} className={`flex-1 border-l border-slate-100 relative ${isToday ? "bg-blue-50/30" : ""}`}
              style={{ minHeight: HOURS.length * 56 + "px" }}>
              {HOURS.map(h => (
                <div key={h} className="h-14 border-b border-slate-100 time-slot" onClick={() => onSlotClick(dateStr, h)} />
              ))}
              <div className="absolute inset-0 pointer-events-none">
                {laid.map(b => {
                  const room = rooms.find(r => r.id === b.roomId);
                  return (
                    <div key={b.id} className="pointer-events-auto">
                      <BookingChip
                        booking={b} room={room} currentUser={currentUser}
                        onClick={onChipClick} col={b.col} totalCols={b.totalCols}
                      />
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── BOOKING FORM MODAL ────────────────────────────────────────────────────────
function BookingModal({ isOpen, onClose, onSave, onDelete, rooms, initialData, bookings, currentUser }) {
  const isEdit = !!initialData?.id;
  const defaultForm = { roomId: rooms[0]?.id, title: "", date: todayStr(0), startTime: "09:00", endTime: "10:00", attendees: "", notes: "" };
  const [form, setForm]         = useState(defaultForm);
  const [conflict, setConflict] = useState(null);

  useEffect(() => {
    if (isOpen) {
      setForm(initialData || defaultForm);
      setConflict(null);
    }
  }, [isOpen, initialData]);

  if (!isOpen) return null;

  const set = (k, v) => {
    const updated = { ...form, [k]: v };
    setForm(updated);
    // Real-time conflict check
    if (updated.roomId && updated.date && updated.startTime && updated.endTime) {
      const conflicting = bookings.find(b => {
        if (b.id === updated.id) return false;
        if (b.roomId !== updated.roomId || b.date !== updated.date) return false;
        const bS = timeToMinutes(b.startTime), bE = timeToMinutes(b.endTime);
        const cS = timeToMinutes(updated.startTime), cE = timeToMinutes(updated.endTime);
        return cS < bE && cE > bS;
      });
      setConflict(conflicting || null);
    }
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (conflict) return;
    onSave({ ...form, id: form.id || Date.now(), bookedById: currentUser?.id, bookedByName: currentUser?.name });
  };

  const canEdit = !isEdit || initialData?.bookedById === currentUser?.id || currentUser?.role === "Admin";

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay bg-black/30">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden max-h-[90vh] overflow-y-auto">
        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10">
          <h2 className="text-lg font-bold text-slate-800">{isEdit ? "✏️ Edit Booking" : "📅 Booking Baru"}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
        </div>

        <form onSubmit={handleSubmit} className="p-6 space-y-4">
          {/* Title */}
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Nama Meeting *</label>
            <input type="text" required placeholder="cth. Sprint Planning" value={form.title}
              onChange={e => set("title", e.target.value)} disabled={!canEdit}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50" />
          </div>

          {/* Room */}
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Pilih Room *</label>
            <div className="grid grid-cols-2 gap-2">
              {rooms.map(room => (
                <button type="button" key={room.id} disabled={!canEdit}
                  onClick={() => set("roomId", room.id)}
                  className={`text-left rounded-lg p-2.5 border-2 transition-all text-sm disabled:cursor-not-allowed ${form.roomId === room.id ? "shadow-md" : "border-slate-100 bg-slate-50"}`}
                  style={form.roomId === room.id ? { borderColor: room.colorHex, backgroundColor: room.colorHex + "12" } : {}}>
                  <div className="flex items-center gap-1.5">
                    <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: room.colorHex }} />
                    <span className="font-semibold text-slate-800">{room.name}</span>
                  </div>
                  <div className="text-xs text-slate-500 mt-0.5">👥 {room.capacity} orang</div>
                </button>
              ))}
            </div>
          </div>

          {/* Date + Time */}
          <div className="grid grid-cols-3 gap-3">
            <div className="col-span-3 sm:col-span-1">
              <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Tanggal *</label>
              <input type="date" required value={form.date} onChange={e => set("date", e.target.value)} disabled={!canEdit}
                className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Mulai *</label>
              <input type="time" required value={form.startTime} onChange={e => set("startTime", e.target.value)} disabled={!canEdit}
                className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Selesai *</label>
              <input type="time" required value={form.endTime} onChange={e => set("endTime", e.target.value)} disabled={!canEdit}
                className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50" />
            </div>
          </div>

          {/* Conflict Warning */}
          {conflict && (
            <div className="bg-red-50 border border-red-300 rounded-lg px-4 py-3 text-sm text-red-700 flex items-start gap-2">
              <span className="text-lg flex-shrink-0">⚠️</span>
              <div>
                <strong>Konflik Jadwal!</strong> Room ini sudah dibooking untuk <strong>"{conflict.title}"</strong> pukul {conflict.startTime}–{conflict.endTime} oleh {conflict.bookedByName || "pengguna lain"}.
                Silakan pilih waktu atau room yang berbeda.
              </div>
            </div>
          )}

          {/* Attendees */}
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Peserta</label>
            <input type="text" placeholder="cth. Tim Product, Budi, +3" value={form.attendees}
              onChange={e => set("attendees", e.target.value)} disabled={!canEdit}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50" />
          </div>

          {/* Notes */}
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Catatan</label>
            <textarea placeholder="Catatan opsional..." value={form.notes} onChange={e => set("notes", e.target.value)}
              rows={2} disabled={!canEdit}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none disabled:bg-slate-50" />
          </div>

          {!canEdit && (
            <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-700">
              🔒 Hanya pembuat booking atau Admin yang bisa mengedit.
            </div>
          )}

          {/* Booked by */}
          {isEdit && initialData?.bookedByName && (
            <div className="text-xs text-slate-400 flex items-center gap-1">
              <span>👤 Dibooking oleh:</span>
              <span className="font-medium text-slate-600">{initialData.bookedByName}</span>
            </div>
          )}

          {/* Actions */}
          <div className="flex gap-2 pt-1">
            {isEdit && canEdit && (
              <button type="button" onClick={() => onDelete(form.id)}
                className="px-4 py-2 rounded-lg border border-red-200 text-red-500 text-sm font-medium hover:bg-red-50 transition-colors">
                🗑 Hapus
              </button>
            )}
            <div className="flex-1" />
            <button type="button" onClick={onClose}
              className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 transition-colors">
              Batal
            </button>
            {canEdit && (
              <button type="submit" disabled={!!conflict}
                className="px-5 py-2 rounded-xl bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm">
                {isEdit ? "Simpan" : "Booking Sekarang"}
              </button>
            )}
          </div>
        </form>
      </div>
    </div>
  );
}

// ── BOOKING DETAIL MODAL ──────────────────────────────────────────────────────
function BookingDetailModal({ booking, room, onClose, onEdit }) {
  if (!booking) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay bg-black/30">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
        <div className="h-2" style={{ backgroundColor: room.colorHex }} />
        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h2 className="text-base font-bold text-slate-800">{booking.title}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="p-6 space-y-3 text-sm">
          {[
            { icon: "🏢", label: "Room", val: room.name },
            { icon: "📅", label: "Tanggal", val: new Date(booking.date + "T00:00").toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" }) },
            { icon: "🕐", label: "Waktu", val: `${booking.startTime} – ${booking.endTime}` },
            booking.attendees && { icon: "👥", label: "Peserta", val: booking.attendees },
            booking.bookedByName && { icon: "👤", label: "Dibooking oleh", val: booking.bookedByName },
            booking.notes && { icon: "📝", label: "Catatan", val: booking.notes },
          ].filter(Boolean).map(row => (
            <div key={row.label} className="flex items-start gap-3">
              <span className="w-8 text-center text-base flex-shrink-0">{row.icon}</span>
              <div>
                <div className="font-medium text-slate-700">{row.val}</div>
                <div className="text-xs text-slate-400">{row.label}</div>
              </div>
            </div>
          ))}
        </div>
        <div className="px-6 pb-5 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 transition-colors">Tutup</button>
          <button onClick={() => onEdit(booking)} className="flex-1 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition-colors">✏️ Edit</button>
        </div>
      </div>
    </div>
  );
}

// ── NOTIFICATION LOG PANEL ────────────────────────────────────────────────────
function NotificationPanel({ logs, onClose }) {
  return (
    <div className="fixed inset-0 z-50 flex justify-end modal-overlay bg-black/20">
      <div className="w-full max-w-sm bg-white shadow-2xl flex flex-col h-full">
        <div className="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
          <h2 className="font-bold text-slate-800">🔔 Notifikasi</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-3">
          {logs.length === 0 ? (
            <div className="text-center text-slate-400 text-sm py-10">Belum ada notifikasi</div>
          ) : [...logs].reverse().map(log => (
            <div key={log.id} className="bg-slate-50 border border-slate-100 rounded-xl p-3">
              <div className="flex items-start gap-2">
                <span className="text-lg flex-shrink-0">{log.icon}</span>
                <div>
                  <div className="font-semibold text-sm text-slate-800">{log.title}</div>
                  <div className="text-xs text-slate-500 mt-0.5">{log.message}</div>
                  <div className="text-xs text-slate-400 mt-1">{log.channel} · {new Date(log.ts).toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" })}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const INITIAL_BOOKINGS = [
  { id: 1, roomId: 1, title: "Q2 Planning",        date: todayStr(0), startTime: "09:00", endTime: "10:30", attendees: "Product Team",     notes: "", bookedById: 1, bookedByName: "Zulfikar Dwi" },
  { id: 2, roomId: 2, title: "1-on-1 Review",      date: todayStr(0), startTime: "11:00", endTime: "12:00", attendees: "HR + Zulfikar",    notes: "", bookedById: 2, bookedByName: "Firjayanti" },
  { id: 3, roomId: 3, title: "Design Workshop",    date: todayStr(1), startTime: "14:00", endTime: "16:00", attendees: "Design Team",      notes: "Bawa prototype", bookedById: 1, bookedByName: "Zulfikar Dwi" },
  { id: 4, roomId: 1, title: "Investor Call",      date: todayStr(2), startTime: "10:00", endTime: "11:00", attendees: "Exec Team",        notes: "Confidential", bookedById: 2, bookedByName: "Firjayanti" },
  { id: 5, roomId: 4, title: "Team Lunch Meeting", date: todayStr(3), startTime: "12:00", endTime: "13:00", attendees: "All Hands",        notes: "", bookedById: 2, bookedByName: "Firjayanti" },
];

function App() {
  const [currentUser, setCurrentUser]     = useState(null);
  const [bookings, setBookings]           = useState(INITIAL_BOOKINGS);
  const [selectedRooms, setSelectedRooms] = useState(ROOMS.map(r => r.id));
  const [baseDate, setBaseDate]           = useState(new Date());
  const [modalOpen, setModalOpen]         = useState(false);
  const [modalInit, setModalInit]         = useState(null);
  const [detailBooking, setDetailBooking] = useState(null);
  const [notifOpen, setNotifOpen]         = useState(false);
  const [notifLogs, setNotifLogs]         = useState([]);
  const { toasts, addToast }              = useToast();

  const weekDays = useMemo(() => getWeekDays(baseDate), [baseDate]);

  // Simulate sending email notification
  const sendNotification = (type, booking) => {
    const room = ROOMS.find(r => r.id === booking.roomId);
    const icons = { create: "✅", update: "✏️", delete: "🗑️" };
    const titles = { create: "Booking Berhasil", update: "Booking Diperbarui", delete: "Booking Dihapus" };
    const entry = {
      id: Date.now(),
      ts: Date.now(),
      icon: icons[type],
      title: titles[type],
      message: `"${booking.title}" — ${room?.name} · ${booking.date} · ${booking.startTime}–${booking.endTime}`,
      channel: "📧 Email (simulated)",
    };
    setNotifLogs(prev => [...prev, entry]);
    addToast({ icon: icons[type], title: titles[type], message: `${booking.title} di ${room?.name}`, color: room?.colorHex });
  };

  const toggleRoom = id => setSelectedRooms(prev =>
    prev.includes(id) ? (prev.length > 1 ? prev.filter(r => r !== id) : prev) : [...prev, id]
  );

  const prevWeek = () => { const d = new Date(baseDate); d.setDate(d.getDate() - 7); setBaseDate(d); };
  const nextWeek = () => { const d = new Date(baseDate); d.setDate(d.getDate() + 7); setBaseDate(d); };
  const goToday  = () => setBaseDate(new Date());

  const openNew = (date, startTime) => {
    setModalInit({ roomId: selectedRooms[0] || ROOMS[0].id, title: "", date: date || todayStr(0), startTime: startTime || "09:00", endTime: startTime ? addHour(startTime) : "10:00", attendees: "", notes: "" });
    setModalOpen(true);
  };
  const openEdit = (booking) => { setDetailBooking(null); setModalInit({ ...booking }); setModalOpen(true); };

  const handleSave = (data) => {
    const isEdit = bookings.some(b => b.id === data.id);
    setBookings(prev => isEdit ? prev.map(b => b.id === data.id ? data : b) : [...prev, data]);
    setModalOpen(false);
    sendNotification(isEdit ? "update" : "create", data);
  };

  const handleDelete = (id) => {
    const booking = bookings.find(b => b.id === id);
    setBookings(prev => prev.filter(b => b.id !== id));
    setModalOpen(false);
    if (booking) sendNotification("delete", booking);
  };

  const todayBookings = bookings.filter(b => b.date === todayStr(0)).length;
  const unreadNotifs  = notifLogs.length;

  if (!currentUser) return <LoginScreen onLogin={setCurrentUser} />;

  return (
    <div className="flex flex-col h-screen overflow-hidden">
      {/* Top Navbar */}
      <header className="bg-white border-b border-slate-200 px-5 py-2.5 flex items-center gap-3 flex-shrink-0 shadow-sm">
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">📅</div>
          <div>
            <div className="font-bold text-slate-800 leading-tight text-sm">RoomBook</div>
            <div className="text-xs text-slate-400 leading-tight">Majoo</div>
          </div>
        </div>

        <div className="flex items-center gap-1.5 ml-1">
          <button onClick={prevWeek} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">◀</button>
          <button onClick={goToday} className="px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:bg-slate-50">Hari Ini</button>
          <button onClick={nextWeek} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500">▶</button>
          <span className="text-sm font-semibold text-slate-700 ml-1">{formatMonthYear(weekDays[0])}</span>
        </div>

        <div className="ml-auto flex items-center gap-2">
          <div className="hidden sm:flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs text-slate-600">
            🗓 {todayBookings} booking hari ini
          </div>

          {/* Notification bell */}
          <button onClick={() => setNotifOpen(true)} className="relative p-2 rounded-lg hover:bg-slate-100 text-slate-500 transition-colors">
            🔔
            {unreadNotifs > 0 && (
              <span className="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-bold leading-none">
                {unreadNotifs > 9 ? "9+" : unreadNotifs}
              </span>
            )}
          </button>

          {/* User avatar */}
          <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5">
            <div className="w-6 h-6 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center">{currentUser.avatar}</div>
            <span className="text-xs font-medium text-slate-700 hidden sm:block">{currentUser.name}</span>
            <span className="text-xs text-slate-400 hidden sm:block">·</span>
            <button onClick={() => setCurrentUser(null)} className="text-xs text-red-400 hover:text-red-600 hidden sm:block">Keluar</button>
          </div>

          <button onClick={() => openNew()}
            className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-xl shadow-sm transition-colors">
            <span className="text-base leading-none">+</span> Booking
          </button>
        </div>
      </header>

      {/* Main layout */}
      <div className="flex flex-1 overflow-hidden">
        <RoomSidebar rooms={ROOMS} selectedRooms={selectedRooms} onToggleRoom={toggleRoom} />
        <main className="flex-1 flex flex-col overflow-hidden bg-white">
          <CalendarGrid weekDays={weekDays} bookings={bookings} rooms={ROOMS} selectedRooms={selectedRooms}
            currentUser={currentUser} onSlotClick={openNew} onChipClick={b => setDetailBooking(b)} />
        </main>
      </div>

      {/* Modals */}
      <BookingModal isOpen={modalOpen} onClose={() => setModalOpen(false)} onSave={handleSave} onDelete={handleDelete}
        rooms={ROOMS} initialData={modalInit} bookings={bookings} currentUser={currentUser} />

      {detailBooking && (
        <BookingDetailModal booking={detailBooking} room={ROOMS.find(r => r.id === detailBooking.roomId)}
          onClose={() => setDetailBooking(null)} onEdit={openEdit} />
      )}

      {notifOpen && <NotificationPanel logs={notifLogs} onClose={() => setNotifOpen(false)} />}

      <ToastContainer toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
