function sheetUrl(tab) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
}

// Parse satu sheet tab dan kembalikan array bookings
async function parseSheetTab(tab, mapFn) {
  try {
    const res  = await fetch(sheetUrl(tab));
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^{]+/, "").replace(/\);?\s*$/, ""));
    const rows = json?.table?.rows || [];
    const cols = json?.table?.cols || [];
    if (rows.length === 0) return [];
    const colIdx = {};
    cols.forEach((c, i) => { colIdx[c.label] = i; });
    const v = (row, key) => {
      const i = colIdx[key];
      if (i === undefined) return "";
      const cell = row.c && row.c[i];
      if (!cell || cell.v === null || cell.v === undefined) return "";
      // Untuk kolom tanggal: gviz pakai Date(Y,M,D) UTC, bisa off by 1 hari di WIB.
      // Gunakan cell.f (formatted) jika tersedia karena sudah dalam timezone Sheet.
      const sv = String(cell.v);
      if (sv.match(/^Date\(\d+,\d+,\d+\)$/) && cell.f) return String(cell.f);
      return sv;
    };
    return rows.map((row, ri) => mapFn(row, ri, v)).filter(Boolean);
  } catch (err) {
    console.warn(`Gagal baca sheet "${tab}":`, err.message);
    return [];
  }
}

// Helper: parse waktu dari Google Sheets gviz API
// gviz mengirim waktu sebagai "Date(1899,11,30,H,M,S)" — epoch Excel untuk time-only values
function parseTime(val) {
  if (!val && val !== 0) return "";

  // Numeric fraction of day: gviz kadang kirim 0.6666... untuk 4:00 PM
  if (typeof val === "number") {
    const totalMin = Math.round(val * 24 * 60);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
  }

  const s = String(val).trim();

  // "Date(1899,11,30,16,0,0)" — format gviz untuk time-only (jam saja)
  // "Date(2026,4,6,16,0,0)"   — format gviz untuk datetime
  const gviz = s.match(/Date\(\d+,\d+,\d+,(\d+),(\d+)/);
  if (gviz) return String(parseInt(gviz[1])).padStart(2,"0") + ":" + String(gviz[2]).padStart(2,"0");

  // "10:00:00 AM" / "4:00:00 PM" / "10:00 AM" / "4:00 PM"
  const ampm = s.match(/^(\d{1,2}):(\d{2})(?::\d+)?\s*(AM|PM)$/i);
  if (ampm) {
    let h = parseInt(ampm[1]);
    const m = ampm[2];
    const period = ampm[3].toUpperCase();
    if (period === "AM" && h === 12) h = 0;
    if (period === "PM" && h !== 12) h += 12;
    return String(h).padStart(2,"0") + ":" + m;
  }

  // "16:00:00" → "16:00"
  const withSec = s.match(/^(\d{1,2}):(\d{2}):\d{2}$/);
  if (withSec) return String(parseInt(withSec[1])).padStart(2,"0") + ":" + withSec[2];

  // "16:00" atau "9:00"
  const plain = s.match(/^(\d{1,2}):(\d{2})$/);
  if (plain) return String(parseInt(plain[1])).padStart(2,"0") + ":" + plain[2];

  return s;
}

// Helper: parse tanggal dari gviz (bisa "Date(2026,4,6)", "2026-05-06", "5/6/2026", dll)
function parseDate(val) {
  if (!val) return "";
  const s = String(val).trim();

  // sudah YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // "Date(2026,4,6)" — bulan 0-indexed, JANGAN pakai new Date() karena timezone shift
  const gviz = s.match(/Date\((\d+),(\d+),(\d+)/);
  if (gviz) {
    const y = gviz[1];
    const mo = String(parseInt(gviz[2]) + 1).padStart(2, "0");
    const d  = String(parseInt(gviz[3])).padStart(2, "0");
    return `${y}-${mo}-${d}`;
  }

  // "5/6/2026" format M/D/YYYY dari Google Sheets display
  const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mdy) {
    return `${mdy[3]}-${String(mdy[1]).padStart(2,"0")}-${String(mdy[2]).padStart(2,"0")}`;
  }

  // "2026-05-06T..." ISO string — ambil bagian tanggal saja tanpa konversi timezone
  if (s.length >= 10 && s[4] === "-") return s.slice(0, 10);

  return s;
}

// Ambil bookings dari Google Sheet
// Membaca 2 tab: "RoomBook Data" (Apps Script, format bersih) dan
// "Booking Response" (Google Form responses, format kolom bahasa Indonesia)
async function syncFromSheet() {
  // ── Tab 1: "RoomBook Data" — ditulis Apps Script, format bersih
  const fromAppsScript = await parseSheetTab("RoomBook Data", (row, ri, v) => {
    const namaRoom  = v(row, "namaRoom");
    const roomId    = parseInt(v(row, "roomId")) || ROOM_NAME_MAP[namaRoom] || 0;
    const date      = parseDate(v(row, "tanggal"));
    const startTime = parseTime(v(row, "jamMulai"));
    const endTime   = parseTime(v(row, "jamSelesai"));
    if (!roomId || !date || !startTime || !endTime) return null;
    return {
      id:           v(row, "id") || ("rb-" + ri),
      roomId, title: v(row, "judulMeeting") || "(Tanpa Judul)",
      date, startTime, endTime,
      attendees:    v(row, "namaPeserta"),
      notes:        [v(row,"departemen") && "Dept: "+v(row,"departemen"), v(row,"catatan")].filter(Boolean).join(" | "),
      bookedById: null, bookedByName: v(row, "namaLengkap") || "Google Form",
      source: "google-form",
    };
  });

  // ── Tab 2: "Booking Response" — sheet otomatis Google Form
  const fromForm = await parseSheetTab("Booking Response", (row, ri, v) => {
    const namaRoom  = v(row, "Pilih Ruang Meeting").trim();
    const roomId    = ROOM_NAME_MAP[namaRoom]
                   || Object.entries(ROOM_NAME_MAP).find(([k])=>k.toLowerCase()===namaRoom.toLowerCase())?.[1]
                   || 0;
    const date      = parseDate(v(row, "Tanggal Meeting"));
    const rawStart  = v(row, "Waktu Mulai");
    const rawEnd    = v(row, "Waktu Selesai");
    console.log("[DEBUG row "+ri+"] namaRoom="+namaRoom+" roomId="+roomId+" date="+date+" rawStart="+JSON.stringify(rawStart)+" rawEnd="+JSON.stringify(rawEnd));
    const startTime = parseTime(rawStart);
    const endTime   = parseTime(rawEnd);
    console.log("[DEBUG row "+ri+"] startTime="+startTime+" endTime="+endTime);
    if (!roomId || !date || !startTime || !endTime) { console.log("[DEBUG row "+ri+"] SKIPPED — roomId="+roomId+" date="+date+" startTime="+startTime+" endTime="+endTime); return null; }
    const ts = v(row, "Timestamp") || String(ri);
    return {
      id:           "form-" + ts.replace(/[^0-9]/g, ""),
      roomId, title: v(row, "Nama / Judul Meeting") || "(Tanpa Judul)",
      date, startTime, endTime,
      attendees:    v(row, "Nama Peserta"),
      notes:        v(row, "Divisi") ? "Divisi: " + v(row, "Divisi") : "",
      bookedById: null,
      bookedByName: v(row, "Nama Lengkap *") || v(row, "Nama Lengkap") || "Google Form",
      source: "google-form",
    };
  });

  // Gabungkan, hindari duplikat by id
  const all  = [...fromAppsScript, ...fromForm];
  const seen = new Set();
  return all.filter(b => { if (seen.has(b.id)) return false; seen.add(b.id); return true; });
}

// Merge: Sheet bookings + localStorage bookings
// Prioritas: booking yang sudah ada duluan menang, yang baru ditolak jika bentrok
// Collision = ruangan sama + tanggal sama + waktu overlap
function mergeBookings(sheetList, localList) {
  const cancelledIds = loadCancelledIds();

  // Booking lokal non-form (dibuat langsung di app) — prioritas tertinggi
  const localNonForm = localList.filter(b =>
    b.source !== "google-form" && !cancelledIds.has(String(b.id))
  );
  const localIds = new Set(localNonForm.map(b => String(b.id)));

  // Booking lama dari form yang sudah ada di localList (sudah lolos sebelumnya)
  const localFormOld = localList.filter(b =>
    b.source === "google-form" && !cancelledIds.has(String(b.id))
  );
  const localFormIds = new Set(localFormOld.map(b => String(b.id)));

  // Booking baru dari sheet yang belum ada di local
  const sheetNew = sheetList.filter(b =>
    !cancelledIds.has(String(b.id)) &&
    !localIds.has(String(b.id)) &&
    !localFormIds.has(String(b.id))
  );

  // Accepted list: mulai dari semua booking yang sudah ada (local + form lama)
  const accepted = [...localNonForm, ...localFormOld];

  // Tambahkan booking baru dari sheet satu per satu — tolak jika bentrok
  for (const b of sheetNew) {
    const conflict = findConflict(accepted, b);
    if (conflict) {
      // Ruangan sama + waktu overlap → tolak booking baru, simpan ke cancelled
      addCancelledId(b.id);
      console.warn(
        `[Collision] Booking "${b.title}" di ${b.date} ${b.startTime}-${b.endTime} ` +
        `ditolak karena ruangan sudah dibooking: "${conflict.title}" ${conflict.startTime}-${conflict.endTime}`
      );
    } else {
      accepted.push(b);
    }
  }

  return accepted;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function localDateStr(d) {
  // Pakai getFullYear/Month/Date (timezone lokal) bukan toISOString() (UTC)
  const y  = d.getFullYear();
  const mo = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${mo}-${dd}`;
}
function offsetDay(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return localDateStr(d);
}
function todayStr() { return offsetDay(0); }
function toMin(t) { const [h,m] = t.split(":").map(Number); return h*60+m; }
function addHour(t) { const [h,m] = t.split(":").map(Number); return `${String(Math.min(h+1,20)).padStart(2,"0")}:${String(m).padStart(2,"0")}`; }
function fmtMonthYear(d) { return d.toLocaleDateString("id-ID",{month:"long",year:"numeric"}); }
function getWeekDays(base) {
  const d   = new Date(base);
  const mon = new Date(d);
  const day = d.getDay();
  mon.setDate(d.getDate() - (day===0 ? 6 : day-1));
  return Array.from({length:7},(_,i)=>{ const dd=new Date(mon); dd.setDate(mon.getDate()+i); return dd; });
}
const HOURS = Array.from({length:13},(_,i)=>`${String(i+8).padStart(2,"0")}:00`);

function addCancelledId(id) {

// ─── CONFLICT DETECTION ───────────────────────────────────────────────────────
function findConflict(bookings, candidate) {
  const cS = toMin(candidate.startTime), cE = toMin(candidate.endTime);
  return bookings.find(b => {
    if (b.id === candidate.id) return false;
    if (b.roomId !== candidate.roomId || b.date !== candidate.date) return false;
    return cS < toMin(b.endTime) && cE > toMin(b.startTime);
  }) || null;
}

// ─── SIDE-BY-SIDE COLUMN LAYOUT ───────────────────────────────────────────────
function computeColumns(dayBookings) {
  const sorted = [...dayBookings].sort((a,b)=>toMin(a.startTime)-toMin(b.startTime));
  const colEnds = [];
  const withCol = sorted.map(b => {
    const bS = toMin(b.startTime), bE = toMin(b.endTime);
    let col = colEnds.findIndex(e => e <= bS);
    if (col === -1) { col = colEnds.length; colEnds.push(bE); } else { colEnds[col] = bE; }
    return { ...b, col };
  });
  return withCol.map(b => {
    const bS = toMin(b.startTime), bE = toMin(b.endTime);
    const overlapping = withCol.filter(o => bS < toMin(o.endTime) && bE > toMin(o.startTime));
    return { ...b, totalCols: Math.max(...overlapping.map(o=>o.col))+1 };
  });
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const add = useCallback(({ icon="ℹ️", title, message, color }) => {
    const id = Date.now();
    setToasts(p=>[...p,{id,icon,title,message,color,leaving:false}]);
    setTimeout(()=>{
      setToasts(p=>p.map(t=>t.id===id?{...t,leaving:true}:t));
      setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),350);
    },3500);
  },[]);
  return { toasts, add };
}
function ToastContainer({ toasts }) {
  return (
    <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
      {toasts.map(t=>(
        <div key={t.id} className={`pointer-events-auto flex items-start gap-3 bg-white border rounded-xl shadow-lg px-4 py-3 min-w-[280px] max-w-sm ${t.leaving?"toast-out":"toast-in"}`}
          style={{borderColor:t.color||"#e2e8f0"}}>
          <span className="text-xl flex-shrink-0">{t.icon}</span>
          <div><div className="font-semibold text-sm text-slate-800">{t.title}</div>
          <div className="text-xs text-slate-500 mt-0.5">{t.message}</div></div>
        </div>
      ))}
    </div>
  );
}

// ─── LOGIN / REGISTER / LUPA PASSWORD ────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [tab,      setTab]      = useState("login"); // "login" | "register"
  const [forgot,   setForgot]   = useState(false);
  const [email,    setEmail]    = useState("");
  const [password, setPassword] = useState("");
  const [name,     setName]     = useState("");
  const [newPass,  setNewPass]  = useState("");
  const [confirm,  setConfirm]  = useState("");
  const [error,    setError]    = useState("");
  const [success,  setSuccess]  = useState("");
  const [loading,  setLoading]  = useState(false);

  const switchTab = (t) => { setTab(t); setForgot(false); setError(""); setSuccess(""); setEmail(""); setPassword(""); setName(""); setNewPass(""); setConfirm(""); };
  const openForgot = () => { setForgot(true); setError(""); setSuccess(""); setEmail(""); setNewPass(""); setConfirm(""); };
  const closeForgot = () => { setForgot(false); setError(""); setSuccess(""); };

  const handleLogin = e => {
    e.preventDefault(); setError(""); setLoading(true);
    setTimeout(()=>{
      const users = loadUsers();
      const user = users.find(u => u.email === email && u.password === password);
      if (user) { const {password:_, ...safe} = user; onLogin(safe); }
      else { setError("Email atau password salah."); setLoading(false); }
    }, 500);
  };

  const handleRegister = e => {
    e.preventDefault(); setError(""); setLoading(true);
    setTimeout(()=>{
      const users = loadUsers();
      if (users.find(u => u.email === email)) { setError("Email sudah terdaftar."); setLoading(false); return; }
      if (password.length < 6) { setError("Password minimal 6 karakter."); setLoading(false); return; }
      if (password !== confirm) { setError("Konfirmasi password tidak cocok."); setLoading(false); return; }
      const initials = name.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
      const role = ADMIN_EMAILS.includes(email) ? "Admin" : "Employee";
      const newUser = { id: Date.now(), name, email, avatar: initials, role, password };
      saveUsers([...users, newUser]);
      setSuccess("Akun berhasil dibuat! Silakan masuk.");
      setLoading(false);
      setTimeout(()=>switchTab("login"), 1500);
    }, 500);
  };

  const handleReset = e => {
    e.preventDefault(); setError(""); setLoading(true);
    setTimeout(()=>{
      const users = loadUsers();
      const idx = users.findIndex(u => u.email === email);
      if (idx === -1) { setError("Email tidak ditemukan."); setLoading(false); return; }
      if (newPass.length < 6) { setError("Password baru minimal 6 karakter."); setLoading(false); return; }
      if (newPass !== confirm) { setError("Konfirmasi password tidak cocok."); setLoading(false); return; }
      users[idx] = { ...users[idx], password: newPass };
      saveUsers(users);
      setSuccess("Password berhasil diubah!");
      setLoading(false);
      setTimeout(()=>{ closeForgot(); setTab("login"); }, 1500);
    }, 500);
  };

  const TabBtn = ({id, label}) => (
    <button onClick={()=>switchTab(id)}
      className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-colors ${tab===id && !forgot ? "bg-blue-600 text-white shadow-sm" : "text-slate-500 hover:text-slate-700"}`}>
      {label}
    </button>
  );

  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 flex items-center justify-center p-4">
      <div className="w-full max-w-md">
        <div className="text-center mb-8">

// ─── BOOKING CHIP ─────────────────────────────────────────────────────────────
function BookingChip({ booking, room, currentUser, col, totalCols, onClick }) {
  const SLOT_H   = 56;
  const start    = toMin(booking.startTime) - toMin("08:00");
  const duration = toMin(booking.endTime)   - toMin(booking.startTime);
  const top    = (start/60)*SLOT_H;
  const height = Math.max((duration/60)*SLOT_H-4, 24);
  const GAP    = 2;
  const isOwn  = booking.bookedById === currentUser?.id;
  return (
    <div className="absolute rounded-lg px-2 py-1 booking-chip cursor-pointer shadow-sm hover:shadow-md hover:z-10 transition-shadow overflow-hidden"
      style={{
        top:             top+"px", height:height+"px",
        left:            `calc(${(col/totalCols)*100}% + ${col===0?4:GAP}px)`,
        width:           `calc(${(1/totalCols)*100}% - ${col===0?GAP+4:GAP*2}px)`,
        backgroundColor: room.colorHex+"22",
        borderLeft:      `3px solid ${room.colorHex}`,
        color:           room.colorHex,
      }}
      onClick={()=>onClick(booking)}>
      <div className="font-semibold truncate">{booking.title}</div>
      {height>36 && <div className="text-xs opacity-75 truncate">{booking.startTime}–{booking.endTime}</div>}
      {height>52 && isOwn && <div className="text-xs opacity-60 truncate">📌 Saya</div>}
    </div>
  );
}

// ─── CALENDAR GRID ────────────────────────────────────────────────────────────
function CalendarGrid({ weekDays, bookings, rooms, selectedRooms, currentUser, onSlotClick, onChipClick }) {
  return (
    <div className="flex-1 overflow-auto">
      <div className="sticky top-0 z-10 bg-white border-b border-slate-200 flex">
        <div className="w-16 flex-shrink-0"/>
        {weekDays.map((day,i)=>{
          const isToday = localDateStr(day)===todayStr();
          return (
            <div key={i} className={`flex-1 text-center py-3 border-l border-slate-100 ${isToday?"text-blue-600 bg-blue-50":"text-slate-600"}`}>
              <span className="text-xs font-normal text-slate-400 block">{day.toLocaleDateString("id-ID",{weekday:"short"})}</span>
              <span className={`text-lg font-bold leading-tight ${isToday?"bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center mx-auto":""}`}>{day.getDate()}</span>
            </div>
          );
        })}
      </div>
      <div className="flex">
        <div className="w-16 flex-shrink-0">
          {HOURS.map(h=>(
            <div key={h} className="h-14 flex items-start justify-end pr-2 pt-1">
              <span className="text-xs text-slate-400 font-medium">{h}</span>
            </div>
          ))}
        </div>
        {weekDays.map((day,di)=>{
          const dateStr = localDateStr(day);
          const isToday = dateStr===todayStr();
          const laid    = computeColumns(bookings.filter(b=>b.date===dateStr && selectedRooms.includes(b.roomId)));
          return (
            <div key={di} className={`flex-1 border-l border-slate-100 relative ${isToday?"bg-blue-50/30":""}`}
              style={{minHeight:HOURS.length*56+"px"}}>
              {HOURS.map(h=>(
                <div key={h} className="h-14 border-b border-slate-100 time-slot" onClick={()=>onSlotClick(dateStr,h)}/>
              ))}
              <div className="absolute inset-0 pointer-events-none">
                {laid.map(b=>{
                  const room = rooms.find(r=>r.id===b.roomId);
                  return (
                    <div key={b.id} className="pointer-events-auto">
                      <BookingChip booking={b} room={room} currentUser={currentUser}
                        col={b.col} totalCols={b.totalCols} onClick={onChipClick}/>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── BOOKING FORM MODAL ───────────────────────────────────────────────────────
function BookingModal({ isOpen, onClose, onSave, onDelete, rooms, initialData, bookings, currentUser }) {
  const isEdit = !!initialData?.id;
  const blank  = { roomId:rooms[0]?.id, title:"", date:todayStr(), startTime:"09:00", endTime:"10:00", attendees:"", notes:"" };
  const [form,     setForm]     = useState(blank);
  const [conflict, setConflict] = useState(null);

  useEffect(()=>{ if(isOpen){ setForm(initialData||blank); setConflict(null); } },[isOpen,initialData]);
  if (!isOpen) return null;

  const set = (k,v) => {
    const up = {...form,[k]:v};
    setForm(up);
    if (up.roomId && up.date && up.startTime && up.endTime)
      setConflict(findConflict(bookings, up));
  };

  const canEdit = !isEdit || initialData?.bookedById===currentUser?.id || currentUser?.role==="Admin";

  const submit = e => {
    e.preventDefault();
    if (conflict) return;
    onSave({...form, id:form.id||Date.now(), bookedById:currentUser?.id, bookedByName:currentUser?.name, bookedByEmail:currentUser?.email});
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay bg-black/30">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10">
          <h2 className="text-lg font-bold text-slate-800">{isEdit?"✏️ Edit Booking":"📅 Booking Baru"}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
        </div>
        <form onSubmit={submit} className="p-6 space-y-4">

          {/* Title */}
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Nama Meeting *</label>
            <input type="text" required placeholder="cth. Sprint Planning" value={form.title}
              onChange={e=>set("title",e.target.value)} disabled={!canEdit}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50"/>
          </div>

          {/* Room */}
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Pilih Room *</label>
            <div className="grid grid-cols-2 gap-2">
              {rooms.map(room=>(
                <button type="button" key={room.id} disabled={!canEdit}
                  onClick={()=>set("roomId",room.id)}
                  className={`text-left rounded-lg p-2.5 border-2 transition-all text-sm ${form.roomId===room.id?"shadow-md":"border-slate-100 bg-slate-50"}`}
                  style={form.roomId===room.id?{borderColor:room.colorHex,backgroundColor:room.colorHex+"12"}:{}}>
                  <div className="flex items-center gap-1.5">
                    <span className="w-2.5 h-2.5 rounded-full" style={{backgroundColor:room.colorHex}}/>
                    <span className="font-semibold text-slate-800">{room.name}</span>
                  </div>
                  <div className="text-xs text-slate-500 mt-0.5">👥 {room.capacity} orang</div>
                </button>
              ))}
            </div>
          </div>

          {/* Date + Time */}
          <div className="grid grid-cols-3 gap-3">
            <div className="col-span-3 sm:col-span-1">
              <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Tanggal *</label>
              <input type="date" required value={form.date} onChange={e=>set("date",e.target.value)} disabled={!canEdit}
                className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50"/>
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Mulai *</label>
              <input type="time" required value={form.startTime} onChange={e=>set("startTime",e.target.value)} disabled={!canEdit}
                className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50"/>
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Selesai *</label>
              <input type="time" required value={form.endTime} onChange={e=>set("endTime",e.target.value)} disabled={!canEdit}
                className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50"/>
            </div>
          </div>

          {/* Conflict warning */}
          {conflict && (
            <div className="bg-red-50 border border-red-300 rounded-lg px-4 py-3 text-sm text-red-700 flex items-start gap-2">
              <span className="text-lg flex-shrink-0">⚠️</span>
              <div><strong>Konflik Jadwal!</strong> Room sudah dibooking untuk <strong>"{conflict.title}"</strong> pukul {conflict.startTime}–{conflict.endTime} oleh {conflict.bookedByName||"pengguna lain"}.</div>
            </div>
          )}

          {/* Attendees */}
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Peserta</label>
            <input type="text" placeholder="cth. Tim Product, Budi, +3" value={form.attendees}
              onChange={e=>set("attendees",e.target.value)} disabled={!canEdit}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:bg-slate-50"/>
          </div>

          {/* Notes */}
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wider">Catatan</label>
            <textarea placeholder="Catatan opsional..." value={form.notes} onChange={e=>set("notes",e.target.value)}
              rows={2} disabled={!canEdit}
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none disabled:bg-slate-50"/>
          </div>

          {!canEdit && (
            <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-700">
              🔒 Hanya pembuat booking atau Admin yang bisa mengedit.
            </div>
          )}
          {isEdit && initialData?.bookedByName && (
            <div className="text-xs text-slate-400">👤 Dibooking oleh: <span className="font-medium text-slate-600">{initialData.bookedByName}</span></div>
          )}

          <div className="flex gap-2 pt-1">
            {isEdit && canEdit && (
              <button type="button" onClick={()=>onDelete(form.id)}
                className="px-4 py-2 rounded-lg border border-red-200 text-red-500 text-sm font-medium hover:bg-red-50">
                🗑 Hapus
              </button>
            )}
            <div className="flex-1"/>
            <button type="button" onClick={onClose}
              className="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50">Batal</button>
            {canEdit && (
              <button type="submit" disabled={!!conflict}
                className="px-5 py-2 rounded-xl bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                {isEdit?"Simpan":"Booking Sekarang"}
              </button>
            )}
          </div>
        </form>
      </div>
    </div>
  );
}

// ─── BOOKING DETAIL MODAL ─────────────────────────────────────────────────────
function DetailModal({ booking, room, onClose, onEdit, onCancel, currentUser }) {
  if (!booking) return null;

  // Cek apakah user yang login adalah pemilik booking
  const isOwner = (() => {
    if (!currentUser) return false;
    // Booking dari Google Form — cocokkan via email (paling akurat)
    if (booking.source === "google-form") {
      if (booking.bookedByEmail && booking.bookedByEmail === currentUser.email) return true;
      // Jika tidak ada email tersimpan, tidak bisa diklaim kepemilikannya
      return false;
    }
    // Booking dari app langsung — cocokkan via id atau email
    if (booking.bookedById && booking.bookedById === currentUser.id) return true;
    if (booking.bookedByEmail && booking.bookedByEmail === currentUser.email) return true;
    return false;
  })();

  const rows = [
    {icon:"🏢",label:"Room",   val:room.name},
    {icon:"📅",label:"Tanggal",val:new Date(booking.date+"T00:00").toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})},
    {icon:"🕐",label:"Waktu",  val:`${booking.startTime} – ${booking.endTime}`},
    booking.attendees    && {icon:"👥",label:"Peserta",        val:booking.attendees},
    booking.bookedByName && {icon:"👤",label:"Dibooking oleh", val:booking.bookedByName},
    booking.notes        && {icon:"📝",label:"Catatan",        val:booking.notes},
  ].filter(Boolean);

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay bg-black/30">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
        <div className="h-2" style={{backgroundColor:room.colorHex}}/>
        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
          <h2 className="text-base font-bold text-slate-800">{booking.title}</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="p-6 space-y-3 text-sm">
          {rows.map(r=>(
            <div key={r.label} className="flex items-start gap-3">
              <span className="w-8 text-center text-base flex-shrink-0">{r.icon}</span>
              <div><div className="font-medium text-slate-700">{r.val}</div><div className="text-xs text-slate-400">{r.label}</div></div>
            </div>
          ))}
        </div>

        {/* Pesan tidak bisa batalkan — tampil untuk Employee yang bukan pemilik */}
        {currentUser?.role !== "Admin" && !isOwner && (
          <div className="mx-6 mb-4 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-xs text-amber-800">
            Booking ini milik <strong>{booking.bookedByName || "karyawan lain"}</strong>. Hanya pemilik booking yang dapat membatalkannya.
          </div>
        )}

        <div className="px-6 pb-5 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2 rounded-lg border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50">Tutup</button>
          {currentUser?.role === "Admin" ? (
            <button onClick={()=>onEdit(booking)} className="flex-1 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700">Edit</button>
          ) : isOwner ? (
            <button onClick={()=>{ if(window.confirm("Batalkan booking ini?")) onCancel(booking.id); }}
              className="flex-1 py-2 rounded-lg bg-red-500 text-white text-sm font-semibold hover:bg-red-600">
              Batalkan Booking
            </button>
          ) : null}
        </div>
      </div>
    </div>
  );
}

// ─── NOTIF PANEL ──────────────────────────────────────────────────────────────
function NotifPanel({ logs, onClose }) {
  return (
    <div className="fixed inset-0 z-50 flex justify-end modal-overlay bg-black/20">
      <div className="w-full max-w-sm bg-white shadow-2xl flex flex-col h-full">
        <div className="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
          <h2 className="font-bold text-slate-800">🔔 Riwayat Booking</h2>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-2xl leading-none">&times;</button>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-3">
          {logs.length===0
            ? <div className="text-center text-slate-400 text-sm py-10">Belum ada aktivitas</div>
            : [...logs].reverse().map(log=>(
              <div key={log.id} className="bg-slate-50 border border-slate-100 rounded-xl p-3">
                <div className="flex items-start gap-2">
                  <span className="text-lg flex-shrink-0">{log.icon}</span>
                  <div>
                    <div className="font-semibold text-sm text-slate-800">{log.title}</div>
                    <div className="text-xs text-slate-500 mt-0.5">{log.message}</div>
                    <div className="text-xs text-slate-400 mt-1">{new Date(log.ts).toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}</div>
                  </div>
                </div>
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [currentUser,    setCurrentUser]    = useState(()=>loadSession());
  const [bookings,       setBookings]       = useState(()=>loadBookings());
  const [selectedRooms,  setSelectedRooms]  = useState(ROOMS.map(r=>r.id));
  const [baseDate,       setBaseDate]       = useState(new Date());
  const [modalOpen,      setModalOpen]      = useState(false);
  const [modalInit,      setModalInit]      = useState(null);
  const [detailBooking,  setDetailBooking]  = useState(null);
  const [notifOpen,      setNotifOpen]      = useState(false);
  const [notifLogs,      setNotifLogs]      = useState([]);
  const [syncing,        setSyncing]        = useState(false);
  const { toasts, add: addToast }           = useToast();

  const weekDays = useMemo(()=>getWeekDays(baseDate),[baseDate]);

  // Persist bookings ke localStorage setiap kali berubah
  useEffect(()=>saveBookings(bookings),[bookings]);

  // Sync dari Google Sheet saat pertama login / saat app load
  const doSync = useCallback(async () => {
    setSyncing(true);
    try {
      const sheetData = await syncFromSheet();
      if (sheetData.length > 0) {
        setBookings(prev => {
          const beforeCount  = prev.filter(b => b.source === "google-form").length;
          const merged       = mergeBookings(sheetData, prev);
          const afterCount   = merged.filter(b => b.source === "google-form").length;
          const rejectedCount = sheetData.length - afterCount;
          saveBookings(merged);

          if (rejectedCount > 0) {
            setTimeout(() => addToast({
              icon:"⛔", title:"Booking Ditolak",
              message:`${rejectedCount} booking dari form ditolak karena bentrok jadwal`,
              color:"#ef4444"
            }), 300);
          }
          return merged;
        });
        addToast({ icon:"🔄", title:"Sinkronisasi Selesai", message:`${sheetData.length} booking dari Google Form diproses`, color:"#10b981" });
      } else {
        addToast({ icon:"🔄", title:"Sinkronisasi Selesai", message:"Tidak ada booking baru dari Google Form", color:"#6b7280" });
      }
    } catch(e) {
      console.warn("Sync error:", e);
    }
    setSyncing(false);
  }, []);

  // Auto-sync saat app pertama dibuka (jika sudah login)
  useEffect(()=>{ if (currentUser) doSync(); },[currentUser]);

  const login = user => { saveSession(user); setCurrentUser(user); };
  const logout = () => { saveSession(null); setCurrentUser(null); };

  const notify = (type, booking) => {
    const room  = ROOMS.find(r=>r.id===booking.roomId);
    const icons = {create:"✅",update:"✏️",delete:"🗑️"};
    const titles= {create:"Booking Berhasil",update:"Booking Diperbarui",delete:"Booking Dihapus"};
    const entry = {id:Date.now(),ts:Date.now(),icon:icons[type],title:titles[type],
      message:`"${booking.title}" — ${room?.name} · ${booking.date} · ${booking.startTime}–${booking.endTime}`};
    setNotifLogs(p=>[...p,entry]);
    addToast({icon:icons[type],title:titles[type],message:`${booking.title} di ${room?.name}`,color:room?.colorHex});
  };

  const toggleRoom = id => setSelectedRooms(p=>
    p.includes(id) ? (p.length>1 ? p.filter(r=>r!==id) : p) : [...p,id]
  );

  const prevWeek = ()=>{ const d=new Date(baseDate); d.setDate(d.getDate()-7); setBaseDate(d); };
  const nextWeek = ()=>{ const d=new Date(baseDate); d.setDate(d.getDate()+7); setBaseDate(d); };

  const openNew = (date, startTime) => {
    setModalInit({roomId:selectedRooms[0]||ROOMS[0].id,title:"",date:date||todayStr(),
      startTime:startTime||"09:00",endTime:startTime?addHour(startTime):"10:00",attendees:"",notes:""});
    setModalOpen(true);
  };
  const openEdit = b => { setDetailBooking(null); setModalInit({...b}); setModalOpen(true); };

  const handleSave = data => {
    const isEdit = bookings.some(b=>b.id===data.id);
    setBookings(p=>isEdit ? p.map(b=>b.id===data.id?data:b) : [...p,data]);
    setModalOpen(false);
    notify(isEdit?"update":"create", data);
  };

  const handleCancel = id => {
    addCancelledId(id);
    setBookings(p => p.filter(b => String(b.id) !== String(id)));
    setDetailBooking(null);
    addToast({ icon:"🚫", title:"Booking Dibatalkan", message:"Booking telah dihapus dan tidak akan muncul lagi.", color:"#ef4444" });
  };

  const handleDelete = id => {
    addCancelledId(id);
    const b = bookings.find(b=>b.id===id);
    setBookings(p=>p.filter(b=>b.id!==id));
    setModalOpen(false);
    if (b) notify("delete", b);
  };

  if (!currentUser) return <LoginScreen onLogin={login}/>;

  const todayCount = bookings.filter(b=>b.date===todayStr()).length;

  return (
    <div className="flex flex-col h-screen overflow-hidden">
      {/* Navbar */}
      <header className="bg-white border-b border-slate-200 px-5 py-2.5 flex items-center gap-3 flex-shrink-0 shadow-sm">
        <div className="flex items-center gap-2.5">
          <svg width="80" height="24" viewBox="0 0 600 180" fill="none" xmlns="http://www.w3.org/2000/svg">

            {syncing ? (
              <svg className="w-3.5 h-3.5 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
            ) : (
              <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M1 4v6h6M23 20v-6h-6"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
              </svg>
            )}
            {syncing ? "Menyinkron..." : "Sync Form"}
          </button>
          <div className="hidden sm:flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-xs text-slate-600">
            {todayCount} booking hari ini
          </div>
          <button onClick={()=>setNotifOpen(true)} className="relative p-2 rounded-lg hover:bg-slate-100 text-slate-500">
            🔔
            {notifLogs.length>0 && (
              <span className="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-bold leading-none">
                {notifLogs.length>9?"9+":notifLogs.length}
              </span>
            )}
          </button>
          <div className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-lg px-2.5 py-1.5">
            <div className="w-6 h-6 rounded-full bg-blue-600 text-white text-xs font-bold flex items-center justify-center">{currentUser.avatar}</div>
            <span className="text-xs font-medium text-slate-700 hidden sm:block">{currentUser.name}</span>
            <span className="text-xs text-slate-400 hidden sm:block">·</span>
            <span className="text-xs text-slate-400 hidden sm:block">{currentUser.role}</span>
            <button onClick={logout} className="text-xs text-red-400 hover:text-red-600 hidden sm:block">Keluar</button>
          </div>
          {currentUser.role === "Admin" && (
            <button onClick={()=>openNew()}
              className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-xl shadow-sm transition-colors">
              <span className="text-base leading-none">+</span> Booking
            </button>
          )}
        </div>
      </header>

      {/* Body */}
      <div className="flex flex-1 overflow-hidden">
        <RoomSidebar rooms={ROOMS} selectedRooms={selectedRooms} onToggle={toggleRoom}/>
        <main className="flex-1 flex flex-col overflow-hidden bg-white">
          <CalendarGrid weekDays={weekDays} bookings={bookings} rooms={ROOMS}
            selectedRooms={selectedRooms} currentUser={currentUser}
            onSlotClick={openNew} onChipClick={b=>setDetailBooking(b)}/>
        </main>
      </div>

      {/* Modals */}
      <BookingModal isOpen={modalOpen} onClose={()=>setModalOpen(false)}
        onSave={handleSave} onDelete={handleDelete} rooms={ROOMS}
        initialData={modalInit} bookings={bookings} currentUser={currentUser}/>

      {detailBooking && (
        <DetailModal booking={detailBooking} room={ROOMS.find(r=>r.id===detailBooking.roomId)}
          onClose={()=>setDetailBooking(null)} onEdit={openEdit}
          onCancel={handleCancel} currentUser={currentUser}/>
      )}

      {notifOpen && <NotifPanel logs={notifLogs} onClose={()=>setNotifOpen(false)}/>}
      <ToastContainer toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
