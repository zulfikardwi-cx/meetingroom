<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <title>Room Display — Majoo</title>
  <script>
    // Link correct manifest based on ?room= param (must run before page renders)
    (function() {
      var p = new URLSearchParams(window.location.search);
      var r = p.get('room') || '1';
      var link = document.createElement('link');
      link.rel = 'manifest';
      link.href = 'manifest-' + r + '.json';
      document.currentScript.parentNode.appendChild(link);
    })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100vh;
      overflow: hidden;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    /* ══════════════════════════════════════════
       BACKGROUND — foto destinasi per room
    ══════════════════════════════════════════ */
    .bg {
      position: fixed; inset: 0;
      background-size: cover;
      background-position: center;
      transition: opacity 0.8s;
    }

    /* Room 1 — Raja Ampat */
    .bg-1 { background-image: url('bg-raja-ampat.jpg'); }
    /* Room 2 — Bromo */
    .bg-2 { background-image: url('bg-bromo.jpg'); }
    /* Room 3 — Tegallalang */
    .bg-3 { background-image: url('bg-tegallalang.jpg'); }
    /* Room 4 — Tanjung Tinggi */
    .bg-4 { background-image: url('bg-tanjung-tinggi.jpg'); }

    /* Dark overlay — merah saat busy, gelap saat available */
    .overlay {
      position: fixed; inset: 0;
      transition: background 0.6s ease;
    }
    .overlay.available { background: linear-gradient(135deg, rgba(0,0,0,0.72) 0%, rgba(0,20,10,0.80) 100%); }
    .overlay.busy      { background: linear-gradient(135deg, rgba(0,0,0,0.72) 0%, rgba(40,0,0,0.85) 100%); }

    /* Edge glow dihapus — status cukup dari pill & overlay */
    .edge-glow { display: none; }

    /* ══════════════════════════════════════════
       LAYOUT: Left | Right
    ══════════════════════════════════════════ */
    .layout {
      position: relative; z-index: 5;
      width: 100%; height: 100vh;
      display: flex;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 40px 36px 52px;
    }

    .left-top {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Logo */
    .logo-wrap { margin-bottom: 32px; }
    .logo-wrap svg { opacity: 0.95; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); }

    /* Status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px 7px 10px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 20px;
      width: fit-content;
      transition: background 0.5s, color 0.5s;
    }
    .status-pill.available { background: rgba(34,197,94,0.2); color: #86efac; border: 1px solid rgba(34,197,94,0.35); }
    .status-pill.busy      { background: rgba(239,68,68,0.2);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.35); }

    .pill-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    .available .pill-dot { background: #22c55e; }
    .busy      .pill-dot { background: #ef4444; }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.6; transform:scale(1.3); }
    }

    /* "Available until / Unavailable until" */
    .until-text {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 14px;
      transition: color 0.5s;
      letter-spacing: 0.2px;
    }
    .until-text.available { color: rgba(187,247,208,0.85); }
    .until-text.busy      { color: rgba(252,165,165,0.85); }

    /* Room name BIG */
    .room-name {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -3px;
      color: white;
      text-shadow: 0 4px 32px rgba(0,0,0,0.5);
      margin-bottom: 16px;
    }

    /* Room meta */
    .room-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    /* Current meeting info */
    .current-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 24px 28px;
      margin-top: 32px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
      transition: color 0.5s;
    }
    .available .card-label { color: rgba(134,239,172,0.6); }
    .busy      .card-label { color: rgba(252,165,165,0.6); }

    .meeting-title {
      font-size: 28px;
      font-weight: 800;
      color: white;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .meeting-info {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      transition: background 0.5s;
    }
    .available .time-badge { background: rgba(34,197,94,0.25); }
    .busy      .time-badge { background: rgba(239,68,68,0.25); }

    .info-item {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Progress bar */
    .progress-wrap { margin-top: 18px; }
    .progress-track {
      height: 5px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s linear, background 0.5s;
    }
    .available .progress-fill { background: #22c55e; }
    .busy      .progress-fill { background: #ef4444; }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    /* Bottom: clock */
    .left-bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .clock-big {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -2px;
      color: white;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    }

    .date-small {
      font-size: 16px;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    /* ── RIGHT PANEL ── */
    .right {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 40px 36px 36px 16px;
      gap: 16px;
    }

    .schedule-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 4px;
    }

    .schedule-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      overflow: hidden;
    }

    .sched-item {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      transition: background 0.3s, border-color 0.3s;
    }

    .sched-item.now-item {
      border-color: rgba(239,68,68,0.5);
      background: rgba(239,68,68,0.1);
    }
    .sched-item.avail-item {
      border-color: rgba(34,197,94,0.3);
      background: rgba(34,197,94,0.06);
    }

    .sched-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .sched-title {
      font-size: 14px;
      font-weight: 700;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .sched-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .badge-now   { background: #dc2626; color: white; }
    .badge-next  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .badge-done  { background: rgba(34,197,94,0.12); color: rgba(34,197,94,0.5); }
    .badge-avail { background: rgba(34,197,94,0.2); color: #86efac; }

    .sched-time {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      font-variant-numeric: tabular-nums;
    }

    .sched-booker {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    /* Empty */
    .empty-all {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: rgba(255,255,255,0.2);
    }
    .empty-icon { font-size: 40px; }
    .empty-text { font-size: 14px; }

    /* Refresh */
    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-top: auto;
      padding-top: 8px;
    }

    /* Loading */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2DBDB6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-size: 15px; color: rgba(255,255,255,0.4); }
  </style>
</head>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SHEET_ID   = "1QbM-K2hGJPE0J8jSi8NsOs2Hj5kt0A-3NY_1-LXNSqo";
const REFRESH_MS = 2 * 60 * 1000;

const ROOMS = {
  1: { name: "Raja Ampat",     color: "#3b82f6", capacity: "Maks. 7 orang", facilities: "TV · Whiteboard",                        bgClass: "bg-1" },
  2: { name: "Bromo",          color: "#f97316", capacity: "Maks. 9 orang", facilities: "TV · Whiteboard · Camera Conference",     bgClass: "bg-2" },
  3: { name: "Tegallalang",    color: "#a855f7", capacity: "Maks. 6 orang", facilities: "TV · Whiteboard · Camera Conference",     bgClass: "bg-3" },
  4: { name: "Tanjung Tinggi", color: "#06b6d4", capacity: "Maks. 6 orang", facilities: "TV · Whiteboard",                        bgClass: "bg-4" },
};

const ROOM_NAME_MAP = { "Raja Ampat":1,"Bromo":2,"Tegallalang":3,"Tegalalang":3,"Tanjung Tinggi":4 };
const HARI  = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
const BULAN = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

// ─── ROOM FROM URL ────────────────────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const ROOM_ID = parseInt(params.get("room")) || 1;
const ROOM    = ROOMS[ROOM_ID] || ROOMS[1];

// Apply background
document.getElementById("bgEl").classList.add(ROOM.bgClass);
document.getElementById("roomNameEl").textContent = ROOM.name;
document.title = ROOM.name + " — Room Display";

// Room meta chips
document.getElementById("roomMeta").innerHTML =

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function toMin(hhmm) {
  if (!hhmm) return 0;
  const [h,m] = String(hhmm).split(":").map(Number);
  return h*60+m;
}
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function todayStr() {
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── PARSE TIME ───────────────────────────────────────────────────────────────
function parseTime(val) {
  if (!val && val!==0) return "";
  if (typeof val==="number") {
    const t=Math.round(val*24*60);
    return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0");
  }
  const s=String(val).trim();
  const gviz=s.match(/Date\(\d+,\d+,\d+,(\d+),(\d+)/);
  if (gviz) return String(parseInt(gviz[1])).padStart(2,"0")+":"+String(gviz[2]).padStart(2,"0");
  const ampm=s.match(/^(\d{1,2}):(\d{2})(?::\d+)?\s*(AM|PM)$/i);
  if (ampm) {
    let h=parseInt(ampm[1]); const m=ampm[2],p=ampm[3].toUpperCase();
    if(p==="AM"&&h===12)h=0; if(p==="PM"&&h!==12)h+=12;
    return String(h).padStart(2,"0")+":"+m;
  }
  const ws=s.match(/^(\d{1,2}):(\d{2}):\d{2}$/);
  if(ws) return String(parseInt(ws[1])).padStart(2,"0")+":"+ws[2];
  const pl=s.match(/^(\d{1,2}):(\d{2})$/);
  if(pl) return String(parseInt(pl[1])).padStart(2,"0")+":"+pl[2];
  return s;
}

function parseDate(val) {
  if (!val) return "";
  const s=String(val).trim();
  const gviz=s.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if(gviz){const y=parseInt(gviz[1]),m=parseInt(gviz[2])+1,d=parseInt(gviz[3]);return y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const mdy=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(mdy) return mdy[3]+"-"+String(parseInt(mdy[1])).padStart(2,"0")+"-"+String(parseInt(mdy[2])).padStart(2,"0");
  return s;
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
function sheetUrl(tab) {
  return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:json&sheet="+encodeURIComponent(tab);
}

async function parseSheetTab(tab, mapFn) {
  try {
    const res=await fetch(sheetUrl(tab));
    const text=await res.text();
    const json=JSON.parse(text.replace(/^[^{]+/,"").replace(/\);\s*$/,""));
    const rows=json?.table?.rows||[], cols=json?.table?.cols||[];
    if(!rows.length) return [];
    const ci={};
    cols.forEach((c,i)=>{ci[c.label]=i;});
    const v=(row,key)=>{
      const i=ci[key]; if(i===undefined) return "";
      const cell=row.c&&row.c[i];
      if(!cell||cell.v===null||cell.v===undefined) return "";
      return cell.v;
    };
    return rows.map((row,ri)=>mapFn(row,ri,v)).filter(Boolean);
  } catch(err){ console.warn("Sheet error:",tab,err); return []; }
}

async function fetchBookings() {
  const today=todayStr();

  const fromScript=await parseSheetTab("RoomBook Data",(row,ri,v)=>{
    const namaRoom=String(v(row,"namaRoom")||"");
    const roomId=parseInt(v(row,"roomId"))||ROOM_NAME_MAP[namaRoom]||0;
    const date=parseDate(String(v(row,"tanggal")||""));
    const start=parseTime(v(row,"jamMulai"));
    const end=parseTime(v(row,"jamSelesai"));
    if(!roomId||!date||!start||!end) return null;
    if(date!==today||roomId!==ROOM_ID) return null;
    return {roomId,date,start,end,
      title:String(v(row,"judulMeeting")||"(Tanpa Judul)"),
      booker:String(v(row,"namaLengkap")||""),
      dept:String(v(row,"departemen")||""),
    };
  });

  const fromForm=await parseSheetTab("Booking Response",(row,ri,v)=>{
    const namaRoom=String(v(row,"Pilih Ruang Meeting")||"");
    const roomId=ROOM_NAME_MAP[namaRoom]||0;
    const date=parseDate(String(v(row,"Tanggal Meeting")||""));
    const start=parseTime(v(row,"Waktu Mulai"));
    const end=parseTime(v(row,"Waktu Selesai"));
    if(!roomId||!date||!start||!end) return null;
    if(date!==today||roomId!==ROOM_ID) return null;
    return {roomId,date,start,end,
      title:String(v(row,"Nama / Judul Meeting")||"(Tanpa Judul)"),
      booker:String(v(row,"Nama Lengkap *")||v(row,"Nama Lengkap")||""),
      dept:String(v(row,"Divisi")||""),
    };
  });

  const all=[...fromScript];
  const existStarts=new Set(fromScript.map(b=>b.start));
  fromForm.forEach(b=>{ if(!existStarts.has(b.start)) all.push(b); });
  all.sort((a,b)=>toMin(a.start)-toMin(b.start));
  return all;
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now=new Date();
  document.getElementById("clockEl").textContent=
    String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
  document.getElementById("dateEl").textContent=
    HARI[now.getDay()]+", "+now.getDate()+" "+BULAN[now.getMonth()]+" "+now.getFullYear();
}
updateClock();
setInterval(updateClock,1000);

// ─── RENDER ───────────────────────────────────────────────────────────────────
let cachedBookings=[];

function setMode(mode) { // "available" | "busy"
  ["overlayEl","edgeGlow","layoutEl"].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove("available","busy");
    el.classList.add(mode);
  });
  const pill=document.getElementById("statusPill");
  pill.classList.remove("available","busy");
  pill.classList.add(mode);
  document.getElementById("untilText").classList.remove("available","busy");
  document.getElementById("untilText").classList.add(mode);
}

function renderDisplay(bookings) {
  const now=nowMin();

  // Find current & next
  const current=bookings.find(b=>toMin(b.start)<=now&&now<toMin(b.end));
  const upcoming=bookings.filter(b=>toMin(b.end)>now);
  const next=upcoming.find(b=>toMin(b.start)>now);

  const isBusy=!!current;
  setMode(isBusy?"busy":"available");

  // Status pill
  document.getElementById("statusPillText").textContent = isBusy ? "OCCUPIED" : "AVAILABLE";

  // Until text
  let untilMsg = "";
  if (isBusy) {
    untilMsg = "Occupied until " + current.end;
  } else if (next) {
    untilMsg = "Available until " + next.start;
  } else {
    untilMsg = "Available all day";
  }
  document.getElementById("untilText").textContent = untilMsg;

  // Current meeting card
  const card=document.getElementById("currentCard");
  if (isBusy) {
    card.style.display="block";
    document.getElementById("currentTitle").textContent=current.title;
    let infoHtml=`<div class="time-badge">🕐 ${current.start} – ${current.end}</div>`;
    if(current.booker) infoHtml+=`<div class="info-item">👤 ${esc(current.booker)}</div>`;
    if(current.dept)   infoHtml+=`<div class="info-item">🏢 ${esc(current.dept)}</div>`;
    document.getElementById("currentInfo").innerHTML=infoHtml;

    // Progress bar
    const startM=toMin(current.start), endM=toMin(current.end);
    const pct=Math.min(100,Math.round(((now-startM)/(endM-startM))*100));
    const rem=endM-now;
    const remStr=rem>=60?Math.floor(rem/60)+"j "+(rem%60>0?rem%60+"m":""):rem+"m lagi";
    document.getElementById("progressWrap").innerHTML=`
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-labels"><span>${current.start}</span><span>${remStr}</span><span>${current.end}</span></div>`;
  } else {
    card.style.display="none";
  }

  // Schedule list
  const list=document.getElementById("scheduleList");
  if (bookings.length===0) {
    list.innerHTML=`<div class="empty-all"><div class="empty-icon">✨</div><div class="empty-text">Tidak ada meeting hari ini</div></div>`;
  } else {
    // Show all today's bookings, max 6
    list.innerHTML = bookings.slice(0,6).map(b=>{
      const isNow=toMin(b.start)<=now&&now<toMin(b.end);
      const isPast=toMin(b.end)<=now;
      const itemClass=isNow?"now-item":(!isPast&&!isNow&&b===next?"avail-item":"");
      const badge=isNow
        ?`<span class="sched-badge badge-now">NOW</span>`
        :isPast
          ?`<span class="sched-badge badge-done">DONE</span>`
          :(b===next?`<span class="sched-badge badge-next">NEXT</span>`:"");
      return `
        <div class="sched-item ${itemClass}" style="opacity:${isPast?0.35:1}">
          <div class="sched-header">
            <div class="sched-title">${esc(b.title)}</div>
            ${badge}
          </div>
          <div class="sched-time">${b.start} – ${b.end}</div>
          ${b.booker?`<div class="sched-booker">👤 ${esc(b.booker)}</div>`:""}
        </div>`;
    }).join("");
  }

  // Refresh info
  const t=new Date();
  document.getElementById("refreshText").textContent=
    "Diperbarui "+String(t.getHours()).padStart(2,"0")+":"+String(t.getMinutes()).padStart(2,"0");
}

// ─── DEMO MODE (?demo=1 di URL untuk preview tampilan OCCUPIED) ───────────────
const isDemo = params.get("demo") === "1";

function getDemoBookings() {
  const now = new Date();
  const hh  = now.getHours();
  const mm  = now.getMinutes();
  const pad = n => String(n).padStart(2,"0");
  const today = todayStr();

  // Booking yang sedang berjalan: mulai 30 menit lalu, selesai 30 menit lagi
  const startH = hh, startM = mm - 30 < 0 ? 60 + (mm - 30) : mm - 30;
  const startHAdj = mm < 30 ? hh - 1 : hh;
  const endH = hh, endM = mm + 30 >= 60 ? (mm + 30) - 60 : mm + 30;
  const endHAdj = mm + 30 >= 60 ? hh + 1 : hh;

  return [
    {
      roomId: ROOM_ID, date: today,
      start: pad(startHAdj < 0 ? 0 : startHAdj) + ":" + pad(mm < 30 ? 60 + mm - 30 : mm - 30),
      end:   pad(endHAdj > 23 ? 23 : endHAdj)   + ":" + pad(mm + 30 >= 60 ? mm + 30 - 60 : mm + 30),
      title: "Product Sync Meeting",
      booker: "Zulfikar Dwiansyah",
      dept: "Customer Experience",
    },
    {
      roomId: ROOM_ID, date: today,
      start: pad(endHAdj > 23 ? 23 : endHAdj) + ":" + pad(mm + 30 >= 60 ? mm + 30 - 60 : mm + 30),
      end:   pad(Math.min(endHAdj + 2, 23))   + ":" + pad(mm + 30 >= 60 ? mm + 30 - 60 : mm + 30),
      title: "1-on-1 Review",
      booker: "Firjayanti",
      dept: "People",
    },
    {
      roomId: ROOM_ID, date: today,
      start: pad(Math.min(endHAdj + 2, 23)) + ":" + pad(mm + 30 >= 60 ? mm + 30 - 60 : mm + 30),
      end:   pad(Math.min(endHAdj + 3, 23)) + ":" + pad(mm + 30 >= 60 ? mm + 30 - 60 : mm + 30),
      title: "Investor Call",
      booker: "Tim Eksekutif",
      dept: "Finance",
    },
  ];
}

// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function loadAndRender() {
  try {
    if (isDemo) {
      cachedBookings = getDemoBookings();
    } else {
      cachedBookings = await fetchBookings();
    }
    renderDisplay(cachedBookings);
  } catch(err) {
    console.error(err);
  } finally {
    document.getElementById("loadingOverlay").style.display="none";
  }
}

function rerender() { renderDisplay(cachedBookings); }

loadAndRender();
setInterval(rerender, 30*1000);
setInterval(loadAndRender, REFRESH_MS);

// ─── AUTO FULLSCREEN ──────────────────────────────────────────────────────────
function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen)            el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
  else if (el.msRequestFullscreen)     el.msRequestFullscreen();
}

// Coba fullscreen otomatis saat load
window.addEventListener("load", () => {
  setTimeout(goFullscreen, 500);
});

// Fallback: tap mana saja untuk masuk fullscreen (Android butuh user gesture)
document.addEventListener("click", goFullscreen, { once: true });
document.addEventListener("touchstart", goFullscreen, { once: true });
</script>
